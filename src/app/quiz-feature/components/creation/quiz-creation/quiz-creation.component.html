<form [formGroup]="quizForm" (ngSubmit)="$event.preventDefault(); submitForm()">
  <label for="quiz-name">Quiz Name:</label>
  <input type="text" id="quiz-name" formControlName="quizName" required>
    <ul formArrayName="questions">
      <li *ngFor="let question of questions.controls; let i = index">
        <question-input [formGroup]="getQuestionFormGroup(i)" (remove)="removeQuestion(i)"></question-input>
      </li>
    </ul>
  <button type="submit" (click)="$event.preventDefault(); addQuestion()">Add Question</button>
  <div></div>
  <button type="submit" [disabled]="quizForm.invalid">Submit Quiz</button>
</form>
